<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code Replay</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>

<!-- Upload Screen -->
<div id="upload-screen">
  <h1>Claude Code Replay</h1>
  <p>Upload a Claude Code conversation (.jsonl) to replay it</p>
  <div id="drop-zone">
    <div class="icon">&#128196;</div>
    <div class="label">Drop .jsonl file here</div>
    <div class="sublabel">or click to browse</div>
  </div>
  <input type="file" id="file-input" accept=".jsonl">
  <label class="setting-checkbox" id="autoplay-setting">
    <input type="checkbox" id="autoplay-checkbox">
    <span>Auto-play on load</span>
  </label>
</div>

<!-- Replay Screen -->
<div id="replay-screen">
  <div id="controls">
    <button class="ctrl-btn" id="btn-play" title="Play/Pause (Space)">&#9654; Play</button>
    <button class="ctrl-btn" id="btn-step" title="Step (Right Arrow)">Step</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-slower">&#8722;</button>
    <div id="speed-display">1x</div>
    <button class="ctrl-btn" id="btn-faster">+</button>
    <div class="ctrl-sep"></div>
    <button class="ctrl-btn" id="btn-realtime" title="Real-time mode (T) — use actual timestamps">Real-time</button>
    <div class="ctrl-sep"></div>
    <div id="progress-bar"><div id="progress-fill"></div><div id="progress-ticks"></div></div>
    <div id="msg-counter"></div>
    <div class="ctrl-sep"></div>
    <button id="new-file-btn">New file</button>
  </div>

  <div id="task-panel"></div>
  <div id="chat"><div id="chat-inner"></div></div>

  <div id="status-bar">
    <div class="status-item">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <div class="status-item" id="status-model"></div>
    <div class="status-spacer"></div>
    <div class="status-item" id="status-branch"></div>
  </div>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
